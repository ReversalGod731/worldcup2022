* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #8a1538;
  --secondary: #00a859;
  --accent: #f9a825;
  --dark: #0a1f0a;
  --glass: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.15);
}
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: #051105;
  color: #fff;
  overflow-x: hidden;
}
#canvas-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
}
nav {
  position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
  background: rgba(5,17,5,0.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--glass-border);
  display: flex; justify-content: center; gap: 8px; padding: 12px 20px; flex-wrap: wrap;
}
nav a {
  color: #ccc; text-decoration: none; padding: 8px 18px; border-radius: 20px;
  font-size: 14px; font-weight: 500; transition: all 0.3s; border: 1px solid transparent;
}
nav a:hover, nav a.active { color: #fff; background: rgba(138,21,56,0.4); border-color: var(--primary); }

section { position: relative; z-index: 1; padding: 80px 20px; max-width: 1400px; margin: 0 auto; }
.hero {
  min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-align: center; padding-top: 100px;
}
.hero h1 { font-size: clamp(36px, 6vw, 72px); font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 40px rgba(138,21,56,0.5); margin-bottom: 10px; }
.hero h2 { font-size: clamp(18px, 2.5vw, 32px); color: var(--secondary); font-weight: 300; margin-bottom: 20px; }
.hero .badge { display: inline-block; padding: 8px 24px; border-radius: 30px; background: linear-gradient(135deg, var(--primary), var(--secondary)); font-weight: 600; font-size: 14px; margin-top: 10px; }
.hero .meta { margin-top: 20px; color: #aaa; font-size: 14px; }

.section-title { font-size: 32px; font-weight: 800; margin-bottom: 40px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 12px; }
.section-title::before, .section-title::after { content: ''; width: 40px; height: 3px; background: linear-gradient(90deg, transparent, var(--accent)); } 
.section-title::after { background: linear-gradient(90deg, var(--accent), transparent); }

/* Groups */
.groups-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
.group-card {
  background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px;
  backdrop-filter: blur(10px); transition: transform 0.3s, box-shadow 0.3s;
}
.group-card:hover { transform: translateY(-5px); box-shadow: 0 10px 40px rgba(0,0,0,0.3); border-color: var(--secondary); }
.group-card .group-label { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 15px; text-align: center; }
.team-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.team-row:last-child { border-bottom: none; }
.team-row .flag { font-size: 28px; }
.team-row .name { flex: 1; font-weight: 600; }
.team-row .name small { display: block; color: #888; font-size: 12px; font-weight: 400; }
.team-row .fifa { font-size: 12px; color: #888; background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 8px; }

/* Knockout */
.knockout-container { display: flex; flex-direction: column; gap: 40px; }
.knockout-round { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
.knockout-round .round-title { width: 100%; text-align: center; font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
.knockout-match {
  background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; min-width: 220px;
  backdrop-filter: blur(10px); text-align: center; transition: all 0.3s;
}
.knockout-match:hover { border-color: var(--accent); }
.knockout-match .teams { display: flex; justify-content: space-between; align-items: center; gap: 10px; font-weight: 700; margin-bottom: 8px; }
.knockout-match .score { font-size: 20px; color: var(--accent); font-weight: 800; }
.knockout-match .winner { font-size: 11px; color: var(--secondary); margin-top: 6px; }

/* Scorers */
.scorers-table { width: 100%; max-width: 800px; margin: 0 auto; background: var(--glass); border-radius: 16px; overflow: hidden; border: 1px solid var(--glass-border); }
.scorers-table .row { display: grid; grid-template-columns: 60px 1fr 80px 80px 60px; align-items: center; padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s; }
.scorers-table .row:hover { background: rgba(255,255,255,0.03); }
.scorers-table .header { background: rgba(138,21,56,0.3); font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
.scorers-table .rank { font-weight: 800; color: var(--accent); font-size: 18px; }
.scorers-table .player-info { display: flex; align-items: center; gap: 12px; }
.scorers-table .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.scorers-table .goals { font-weight: 800; color: var(--accent); font-size: 18px; text-align: center; }
.scorers-table .matches, .scorers-table .eff { text-align: center; color: #aaa; }

/* Teams filter */
.filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
.filter-btn {
  padding: 8px 20px; border-radius: 20px; background: var(--glass); border: 1px solid var(--glass-border);
  color: #ccc; cursor: pointer; font-size: 13px; transition: all 0.3s;

.filter-btn:hover, .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Teams grid */
.teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.team-card {
  background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden;
  backdrop-filter: blur(10px); transition: all 0.3s; cursor: pointer;
}
.team-card:hover { transform: translateY(-5px); box-shadow: 0 15px 50px rgba(0,0,0,0.4); border-color: var(--secondary); }
.team-card.expanded { border-color: var(--accent); }
.team-header { display: flex; align-items: center; gap: 15px; padding: 20px; background: rgba(0,0,0,0.2); }
.team-header .flag { font-size: 48px; }
.team-header .info { flex: 1; }
.team-header .name { font-size: 20px; font-weight: 800; }
.team-header .name span { color: #888; font-size: 14px; font-weight: 400; margin-left: 8px; }
.team-header .meta { display: flex; gap: 10px; margin-top: 6px; font-size: 12px; color: #aaa; }
.team-header .meta span { background: rgba(255,255,255,0.06); padding: 3px 10px; border-radius: 10px; }
.team-header .expand-icon { font-size: 20px; transition: transform 0.3s; color: var(--accent); }
.team-card.expanded .expand-icon { transform: rotate(180deg); }

/* Players */
.players-list { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; padding: 0 20px; }
.team-card.expanded .players-list { max-height: 2000px; padding: 0 20px 20px; }
.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
.player-card {
  background: rgba(0,0,0,0.3); border-radius: 12px; padding: 14px; text-align: center;
  border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; position: relative;

.player-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-3px); }
.player-card.star::before { content: '★'; position: absolute; top: 6px; right: 8px; color: var(--accent); font-size: 16px; }
.player-card .headshot {
  width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 10px;
  background: linear-gradient(135deg, rgba(138,21,56,0.3), rgba(0,168,89,0.3));

.player-card .p-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; line-height: 1.2; }
.player-card .p-meta { font-size: 11px; color: #888; line-height: 1.6; }
.player-card .p-pos {
  display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700;
  margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;

.pos-GK { background: rgba(249,168,37,0.15); color: var(--accent); }
.pos-DF { background: rgba(0,168,89,0.15); color: var(--secondary); }

.pos-FW { background: rgba(138,21,56,0.3); color: #e57373; }

.final-match { border: 2px solid var(--accent); position: relative; }
.final-match::after { content: '🏆'; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 24px; }

footer { text-align: center; padding: 40px 20px; color: #555; font-size: 12px; position: relative; z-index: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #051105; }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

@media (max-width: 768px) {

  .team-header .flag { font-size: 36px; }
  .knockout-match { min-width: 160px; padding: 12px; }
}
</style>

// Groups
const groupsContainer = document.getElementById('groups-container');
Object.entries(worldCupData.groups).forEach(([group, teamNames]) => {
  const card = document.createElement('div');
  card.className = 'group-card';
  let html = `<div class="group-label">Group ${group}</div>`;
  teamNames.forEach(name => {
    const t = teams[name];
    if (t) html += `
      <div class="team-row">
        <span class="flag">${t.flag}</span>
        <div class="name">${t.chinese}<small>${name}</small></div>
        <span class="fifa">FIFA #${t.fifa_rank}</span>
      </div>`;
  });
  card.innerHTML = html;
  groupsContainer.appendChild(card);
});

// Knockout
const knockoutContainer = document.getElementById('knockout-container');
const knockout = worldCupData.knockout;

function renderRound(title, matches, isFinal) {
  const div = document.createElement('div');
  div.className = 'knockout-round';
  let html = `<div class="round-title">${title}</div>`;
  matches.forEach(m => {
    const isFinalMatch = isFinal && m.home === 'Argentina' && m.away === 'France';
    html += `
      <div class="knockout-match ${isFinalMatch ? 'final-match' : ''}">
        <div class="teams">
          <span>${teams[m.home]?.flag || ''} ${m.home}</span>
          <span class="score">${m.score}</span>
          <span>${m.away} ${teams[m.away]?.flag || ''}</span>
        </div>
        <div class="winner">Winner: ${m.winner}</div>
      </div>`;
  });
  div.innerHTML = html;
  knockoutContainer.appendChild(div);
}

renderRound('Round of 16', knockout.round_of_16);
renderRound('Quarter Finals', knockout.quarter_finals);
renderRound('Semi Finals', knockout.semi_finals);
const thirdDiv = document.createElement('div');
thirdDiv.className = 'knockout-round';
thirdDiv.innerHTML = `
  <div class="round-title">Third Place</div>

    <div class="teams">
      <span>${teams[knockout.third_place.home]?.flag || ''} ${knockout.third_place.home}</span>

knockoutContainer.appendChild(thirdDiv);

    <div>Goals</div>

    <div class="row">

        <div class="avatar">${s.photo}</div>

          <div style="font-weight:700">${s.name}</div>

      <div class="matches">${s.matches}</div>

    </div>`;
});
scorersTable.innerHTML = scorersHtml;

// Teams
const teamsContainer = document.getElementById('teams-container');
function renderTeams(filter) {
  teamsContainer.innerHTML = '';
  Object.entries(teams).forEach(([key, team]) => {
    if (filter !== 'all' && team.continent !== filter) return;
    const card = document.createElement('div');
    card.className = 'team-card';
    card.dataset.continent = team.continent;
    let playersHtml = '';
    team.players.forEach(p => {
      const starClass = p.star ? 'star' : '';
      const initials = p.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      playersHtml += `
        <div class="player-card ${starClass}">
          <div class="headshot">${initials}</div>
          <div class="p-pos pos-${p.pos}">${p.pos}</div>
          <div class="p-name">${p.name}</div>
          <div class="p-meta">#${p.no} · ${p.age}岁<br>${p.club}</div>
        </div>`;
    });
    card.innerHTML = `
      <div class="team-header" onclick="toggleTeam(this)">
        <div class="flag">${team.flag}</div>
        <div class="info">
          <div class="name">${team.chinese}<span>${key}</span></div>
          <div class="meta">
            <span>Group ${team.group}</span>
            <span>${team.continent}</span>
            <span>FIFA #${team.fifa_rank}</span>
            <span>${team.players.length} Players</span>
          </div>
        </div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="players-list">
        <div class="player-grid">${playersHtml}</div>
      </div>`;
    teamsContainer.appendChild(card);
  });
}
renderTeams('all');

function toggleTeam(header) {
  const card = header.closest('.team-card');
  card.classList.toggle('expanded');
}

// Filter
const filterBtns = document.querySelectorAll('.filter-btn');
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTeams(btn.dataset.filter);
  });
});

// Navigation
const navLinks = document.querySelectorAll('nav a');
navLinks.forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    navLinks.forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    document.querySelector(link.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
  });
});

// ===================== WEBGL FOOTBALL =====================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Football geometry (icosahedron with black/white materials)
const footballGroup = new THREE.Group();
const geo = new THREE.IcosahedronGeometry(2.5, 1);
const whiteMat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 80, flatShading: true });
const blackMat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 80, flatShading: true });

const mesh = new THREE.Mesh(geo, whiteMat);
footballGroup.add(mesh);

// Add black pentagon-like faces
const icoGeo = new THREE.IcosahedronGeometry(2.48, 1);
const edges = new THREE.EdgesGeometry(icoGeo);
const lineMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
const wireframe = new THREE.LineSegments(edges, lineMat);
footballGroup.add(wireframe);

scene.add(footballGroup);

// Particles
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const speeds = [];
for (let i = 0; i < particleCount; i++) {
  positions[i*3] = (Math.random() - 0.5) * 30;
  positions[i*3+1] = (Math.random() - 0.5) * 30;
  positions[i*3+2] = (Math.random() - 0.5) * 30;
  speeds.push({ x: (Math.random()-0.5)*0.02, y: Math.random()*0.02+0.01, z: (Math.random()-0.5)*0.02 });
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x00a859, size: 0.08, transparent: true, opacity: 0.6 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x8a1538, 0.5, 20);
pointLight.position.set(-5, 3, -5);
scene.add(pointLight);
const greenLight = new THREE.PointLight(0x00a859, 0.4, 20);
greenLight.position.set(5, -3, 5);
scene.add(greenLight);

camera.position.z = 12;

// Animation
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

function animate() {
  requestAnimationFrame(animate);
  
  footballGroup.rotation.x += 0.005;
  footballGroup.rotation.y += 0.008;
  footballGroup.position.x = mouseX * 0.5;
  footballGroup.position.y = -mouseY * 0.5;
  
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pos[i*3] += speeds[i].x;
    pos[i*3+1] += speeds[i].y;
    pos[i*3+2] += speeds[i].z;
    if (pos[i*3+1] > 15) pos[i*3+1] = -15;
    if (pos[i*3] > 15 || pos[i*3] < -15) pos[i*3] *= -1;
    if (pos[i*3+2] > 15 || pos[i*3+2] < -15) pos[i*3+2] *= -1;
  }
  particles.geometry.attributes.position.needsUpdate = true;
  particles.rotation.y += 0.002;
  
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
